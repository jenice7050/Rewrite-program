<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문장별 퇴고 프로그램</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    body.editing {
      padding-bottom: 260px;
    }

    header {
      padding: 24px 18px;
      background: #222;
      color: white;
      text-align: center;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    header p {
      margin: 0;
      color: #ddd;
      font-size: 15px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 18px;
      font-size: 16px;
      line-height: 1.7;
      border: 1px solid #ccc;
      border-radius: 12px;
      resize: vertical;
      background: white;
    }

    button {
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      background: #222;
      color: white;
      font-weight: 700;
    }

    button:hover {
      opacity: 0.86;
    }

    .start-button {
      margin-top: 16px;
      width: 100%;
      font-size: 18px;
      padding: 16px;
    }

    .hidden {
      display: none;
    }

    .progress {
      margin: 16px 0 24px;
      color: #555;
      font-weight: 700;
    }

    .sentence-list {
      margin-top: 20px;
      padding-bottom: 80px;
    }

    .sentence-card {
      padding: 18px;
      margin-bottom: 18px;
      background: white;
      border-radius: 14px;
      border: 1px solid #ddd;
      line-height: 1.8;
      transition: all 0.25s ease;
    }

    .sentence-card.current {
      border: 3px solid #2f6fed;
      background: #eef4ff;
      transform: scale(1.015);
      font-size: 24px;
      font-weight: 700;
      color: #1746a2;
      box-shadow: 0 6px 18px rgba(47, 111, 237, 0.18);
    }

    .sentence-card.completed {
      border-left: 6px solid #555;
    }

    .sentence-card.changed {
      border-left: 6px solid #d62828;
    }

    .sentence-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }

    .sentence-number {
      font-size: 13px;
      font-weight: 800;
      color: #666;
    }

    .edit-card-button {
      padding: 8px 10px;
      font-size: 13px;
      background: #666;
      flex-shrink: 0;
    }

    .original-label,
    .revised-label {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #666;
    }

    .original-text {
      color: #333;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .revised-text {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #ccc;
      color: #d62828;
      font-weight: 800;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .unchanged-text {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #ccc;
      color: #555;
      font-weight: 700;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .editor-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: rgba(245, 245, 245, 0.97);
      border-top: 1px solid #ccc;
      padding: 16px 0;
      backdrop-filter: blur(8px);
    }

    .editor-box {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .current-info {
      margin-bottom: 8px;
      font-weight: 800;
      color: #1746a2;
    }

    #rewriteInput {
      min-height: 120px;
      font-size: 18px;
      line-height: 1.7;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .button-row button {
      padding: 13px 10px;
    }

    .secondary {
      background: #777;
    }

    .blue {
      background: #2f6fed;
    }

    .danger {
      background: #c0392b;
    }

    .result-box {
      margin-top: 30px;
      background: white;
      border-radius: 14px;
      padding: 24px;
      border: 1px solid #ddd;
    }

    #finalText {
      width: 100%;
      min-height: 300px;
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      body.editing {
        padding-bottom: 330px;
      }

      header {
        padding: 20px 14px;
      }

      header h1 {
        font-size: 22px;
      }

      header p {
        font-size: 13px;
      }

      .container {
        padding: 16px;
      }

      textarea {
        min-height: 220px;
        font-size: 16px;
        padding: 15px;
      }

      .sentence-card {
        padding: 15px;
        margin-bottom: 14px;
      }

      .sentence-card.current {
        font-size: 20px;
        transform: none;
      }

      .sentence-header {
        align-items: flex-start;
      }

      .edit-card-button {
        font-size: 12px;
        padding: 7px 9px;
      }

      .editor-box {
        padding: 0 14px;
      }

      #rewriteInput {
        min-height: 115px;
        font-size: 17px;
      }

      .button-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .button-row button {
        padding: 15px 10px;
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>문장별 퇴고 프로그램</h1>
    <p>글을 한 문장씩 나누어 확인하고 다시 쓸 수 있습니다.</p>
  </header>

  <main class="container">
    <section id="inputSection">
      <h2>원문 입력</h2>
      <textarea id="textInput" placeholder="퇴고할 글을 여기에 붙여넣으세요. 줄바꿈이 있으면 줄바꿈도 문장 분리 기준으로 사용됩니다."></textarea>
      <button class="start-button" onclick="startRevision()">시작</button>
    </section>

    <section id="revisionSection" class="hidden">
      <div class="progress" id="progressText"></div>
      <div class="sentence-list" id="sentenceList"></div>
    </section>
  </main>

  <section id="editorPanel" class="editor-panel hidden">
    <div class="editor-box">
      <div class="current-info" id="currentInfo"></div>
      <textarea id="rewriteInput" placeholder="현재 문장을 다시 써 보세요."></textarea>

      <div class="button-row">
        <button class="blue" onclick="completeSentence()">완료</button>
        <button class="secondary" onclick="skipSentence()">넘어가기</button>
        <button class="secondary" onclick="goPreviousSentence()">이전 문장</button>
        <button class="secondary" onclick="loadOriginalSentence()">원문 불러오기</button>
        <button class="danger" onclick="resetProgram()">처음으로</button>
      </div>
    </div>
  </section>

  <main class="container">
    <section id="resultSection" class="result-box hidden">
      <h2>퇴고 완료</h2>
      <p>아래는 퇴고된 문장만으로 구성된 최종 텍스트입니다.</p>
      <textarea id="finalText" readonly></textarea>
      <button class="start-button" onclick="copyFinalText()">복사하기</button>
      <button class="start-button secondary" onclick="backToRevision()">다시 수정하기</button>
      <button class="start-button secondary" onclick="resetProgram()">새 글 퇴고하기</button>
    </section>
  </main>

  <script>
    let sentences = [];
    let revisedSentences = [];
    let currentIndex = 0;

    function splitTextByLinesAndSentences(text) {
      const normalized = text
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .trim();

      if (!normalized) return [];

      const lines = normalized
        .split(/\n+/)
        .map(line => line.trim())
        .filter(Boolean);

      const result = [];

      lines.forEach(line => {
        const sentenceMatches = line.match(/[^.!?。！？…]+[.!?。！？…]+["”’』」)]*|[^.!?。！？…]+$/g);

        if (sentenceMatches) {
          sentenceMatches.forEach(sentence => {
            const trimmed = sentence.trim();
            if (trimmed) result.push(trimmed);
          });
        } else {
          result.push(line);
        }
      });

      return result;
    }

    function startRevision() {
      const text = document.getElementById("textInput").value;
      sentences = splitTextByLinesAndSentences(text);

      if (sentences.length === 0) {
        alert("퇴고할 글을 입력해 주세요.");
        return;
      }

      revisedSentences = new Array(sentences.length).fill(null);
      currentIndex = 0;

      document.body.classList.add("editing");

      document.getElementById("inputSection").classList.add("hidden");
      document.getElementById("revisionSection").classList.remove("hidden");
      document.getElementById("editorPanel").classList.remove("hidden");
      document.getElementById("resultSection").classList.add("hidden");

      renderSentences();
      focusCurrentSentence();
    }

    function renderSentences() {
      const sentenceList = document.getElementById("sentenceList");
      sentenceList.innerHTML = "";

      sentences.forEach((sentence, index) => {
        const card = document.createElement("div");
        card.className = "sentence-card";
        card.id = `sentence-${index}`;

        const isCompleted = revisedSentences[index] !== null;
        const isChanged = isCompleted && revisedSentences[index] !== sentences[index];

        if (index === currentIndex) {
          card.classList.add("current");
        }

        if (isCompleted) {
          card.classList.add("completed");
        }

        if (isChanged) {
          card.classList.add("changed");
        }

        const header = document.createElement("div");
        header.className = "sentence-header";

        const number = document.createElement("div");
        number.className = "sentence-number";
        number.textContent = `문장 ${index + 1}`;

        header.appendChild(number);

        if (isCompleted) {
          const editButton = document.createElement("button");
          editButton.className = "edit-card-button";
          editButton.textContent = "수정하기";
          editButton.onclick = () => editSentence(index);
          header.appendChild(editButton);
        }

        const originalLabel = document.createElement("div");
        originalLabel.className = "original-label";
        originalLabel.textContent = "원문";

        const originalText = document.createElement("div");
        originalText.className = "original-text";
        originalText.textContent = sentence;

        card.appendChild(header);
        card.appendChild(originalLabel);
        card.appendChild(originalText);

        if (isCompleted) {
          const revisedLabel = document.createElement("div");
          revisedLabel.className = "revised-label";

          const revisedText = document.createElement("div");

          if (isChanged) {
            revisedLabel.textContent = "퇴고문";
            revisedText.className = "revised-text";
          } else {
            revisedLabel.textContent = "그대로 사용";
            revisedText.className = "unchanged-text";
          }

          revisedText.textContent = revisedSentences[index];

          card.appendChild(revisedLabel);
          card.appendChild(revisedText);
        }

        sentenceList.appendChild(card);
      });

      updateEditor();
    }

    function updateEditor() {
      const completedCount = revisedSentences.filter(sentence => sentence !== null).length;

      document.getElementById("progressText").textContent =
        `진행 상황: ${completedCount} / ${sentences.length} 완료`;

      document.getElementById("currentInfo").textContent =
        `현재 편집 중인 문장 ${currentIndex + 1} / ${sentences.length}`;

      const rewriteInput = document.getElementById("rewriteInput");

      if (revisedSentences[currentIndex] !== null) {
        rewriteInput.value = revisedSentences[currentIndex];
      } else {
        rewriteInput.value = "";
      }

      setTimeout(() => {
        rewriteInput.focus();
      }, 50);
    }

    function focusCurrentSentence() {
      const currentCard = document.getElementById(`sentence-${currentIndex}`);

      if (currentCard) {
        currentCard.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }
    }

    function completeSentence() {
      const rewriteInput = document.getElementById("rewriteInput");
      const rewritten = rewriteInput.value.trim();

      if (!rewritten) {
        alert("퇴고한 문장을 입력하거나, 넘어가기를 눌러 주세요.");
        return;
      }

      revisedSentences[currentIndex] = rewritten;
      moveToNextUnfinishedSentence();
    }

    function skipSentence() {
      revisedSentences[currentIndex] = sentences[currentIndex];
      moveToNextUnfinishedSentence();
    }

    function goPreviousSentence() {
      saveCurrentDraftIfExists();

      if (currentIndex > 0) {
        currentIndex--;
        renderSentences();
        focusCurrentSentence();
      } else {
        alert("첫 번째 문장입니다.");
      }
    }

    function editSentence(index) {
      saveCurrentDraftIfExists();

      currentIndex = index;

      document.getElementById("resultSection").classList.add("hidden");
      document.getElementById("revisionSection").classList.remove("hidden");
      document.getElementById("editorPanel").classList.remove("hidden");
      document.body.classList.add("editing");

      renderSentences();
      focusCurrentSentence();
    }

    function loadOriginalSentence() {
      document.getElementById("rewriteInput").value = sentences[currentIndex];
      document.getElementById("rewriteInput").focus();
    }

    function saveCurrentDraftIfExists() {
      const editorPanel = document.getElementById("editorPanel");

      if (editorPanel.classList.contains("hidden")) return;

      const currentText = document.getElementById("rewriteInput").value.trim();

      if (currentText) {
        revisedSentences[currentIndex] = currentText;
      }
    }

    function moveToNextUnfinishedSentence() {
      const nextUnfinishedIndex = revisedSentences.findIndex((sentence, index) => {
        return index > currentIndex && sentence === null;
      });

      if (nextUnfinishedIndex !== -1) {
        currentIndex = nextUnfinishedIndex;
        renderSentences();
        focusCurrentSentence();
        return;
      }

      const firstUnfinishedIndex = revisedSentences.findIndex(sentence => sentence === null);

      if (firstUnfinishedIndex !== -1) {
        currentIndex = firstUnfinishedIndex;
        renderSentences();
        focusCurrentSentence();
        return;
      }

      finishRevision();
    }

    function finishRevision() {
      document.getElementById("editorPanel").classList.add("hidden");
      document.body.classList.remove("editing");

      renderSentences();

      const finalText = revisedSentences.join("\n\n");

      document.getElementById("resultSection").classList.remove("hidden");
      document.getElementById("finalText").value = finalText;

      document.getElementById("resultSection").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function backToRevision() {
      document.getElementById("resultSection").classList.add("hidden");
      document.getElementById("revisionSection").classList.remove("hidden");
      document.getElementById("editorPanel").classList.remove("hidden");
      document.body.classList.add("editing");

      currentIndex = 0;
      renderSentences();
      focusCurrentSentence();
    }

    function copyFinalText() {
      const finalText = document.getElementById("finalText");

      navigator.clipboard.writeText(finalText.value)
        .then(() => {
          alert("퇴고된 텍스트가 복사되었습니다.");
        })
        .catch(() => {
          finalText.select();
          finalText.setSelectionRange(0, 999999);
          alert("자동 복사에 실패했습니다. 선택된 텍스트를 직접 복사해 주세요.");
        });
    }

    function resetProgram() {
      const confirmReset = confirm("현재 작업을 모두 지우고 처음으로 돌아갈까요?");

      if (!confirmReset) return;

      sentences = [];
      revisedSentences = [];
      currentIndex = 0;

      document.body.classList.remove("editing");

      document.getElementById("textInput").value = "";
      document.getElementById("rewriteInput").value = "";
      document.getElementById("finalText").value = "";

      document.getElementById("inputSection").classList.remove("hidden");
      document.getElementById("revisionSection").classList.add("hidden");
      document.getElementById("editorPanel").classList.add("hidden");
      document.getElementById("resultSection").classList.add("hidden");

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }
  </script>
</body>
</html>
